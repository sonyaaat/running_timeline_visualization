<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Running Phase Explorer</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/timeline.css">
  <link rel="stylesheet" href="css/detail.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7" defer></script>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <p>Loading your running history...</p>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none">

    <!-- Sign out button — fixed top right -->
    <div id="user-section">
      <span id="user-name"></span>
      <button id="btn-logout" onclick="showLogoutModal()">Sign out</button>
    </div>

    <!-- Logout confirmation modal -->
    <div id="logout-modal-overlay" style="display:none" onclick="hideLogoutModal()">
      <div id="logout-modal" onclick="event.stopPropagation()">
        <p>Are you sure you want to sign out?</p>
        <div id="logout-modal-actions">
          <button id="logout-cancel" onclick="hideLogoutModal()">Cancel</button>
          <a href="/auth/logout" id="logout-confirm">Sign out</a>
        </div>
      </div>
    </div>

    <!-- Header -->
    <header id="header">
      <h1><span class="accent">Running</span> Phase Explorer</h1>
      <p id="meta-label"><span id="meta-runs"></span><span id="meta-since"></span></p>
      <div id="sync-section" style="margin-top: 12px">
        <button id="btn-sync" onclick="runPipeline()">
          ↻ Sync with Strava
        </button>
        <span id="sync-status"></span>
      </div>
    </header>

    <!-- Section 1: Overview timeline (always visible) -->
    <section id="section-overview">
      <div class="section-label">Overview — drag to explore a period <span class="info-hint" data-tooltip="Your full training history at a glance. Each bar is one week of running. Drag any range to zoom into that period and explore it in detail.">?</span></div>
      <div id="overview-chart"></div>
    </section>

    <!-- Section 2: Zoom + detail (hidden until drag) -->
    <section id="section-detail" style="display:none">

      <!-- Header (constrained) -->
      <div class="detail-inner">
        <div id="zoom-header">
          <button id="btn-reset">← All phases</button>
          <span id="zoom-label"></span>
        </div>
        <div class="section-label">Phase Timeline <span class="info-hint" data-tooltip="Click a week bar to see daily runs. Toggle the line to compare pace, HR or efficiency.">?</span></div>
        <div id="zt-line-toggle">
          <span class="zt-toggle-label">Show line:</span>
          <button class="zt-toggle-btn active" data-metric="pace">Pace</button>
          <button class="zt-toggle-btn" data-metric="hr">Avg HR</button>
          <button class="zt-toggle-btn" data-metric="efficiency">Efficiency</button>
          <span class="info-hint zt-no-data-warn" id="zt-warn-data" style="display:none" data-tooltip="">!</span>
          <span class="zt-toggle-sep"></span>
          <button class="zt-toggle-btn zt-dist-btn active" id="zt-dist-toggle">Show distance</button>
        </div>
      </div>

      <!-- 2a: Full-width detailed timeline -->
      <div id="zoom-timeline-chart"></div>

      <!-- Week detail drill-down (constrained, shown on week click) -->
      <div id="week-detail-section" style="display:none">
        <div class="detail-inner">
          <div id="week-detail-content"></div>
        </div>
      </div>

      <!-- Rest of detail (constrained) -->
      <div class="detail-inner">

        <!-- 2b: Single transition detail card (shown on diamond click) -->
        <div id="bp-detail-panel" style="display:none"></div>

        <!-- legacy cards — not shown -->
        <div class="section-label" id="bp-section-label" style="display:none">Phase Transitions</div>
        <div id="breakpoints-container" style="display:none"></div>

        <!-- 2c: Weekly heatmap (appears when phase is clicked) -->
        <div id="heatmap-section" style="display:none">
          <div class="section-label">Weekly Pattern — <span id="heatmap-phase-name"></span></div>
          <div id="heatmap-chart"></div>
        </div>

      </div>
    </section>

  </div>

  <!-- Single back button — fixed, always one step back -->
  <button id="btn-go-back" class="step-up-btn" style="display:none" title="Go back">↑</button>

  <script type="module" src="js/main.js"></script>

  <!-- Transition detail modal -->
  <div id="bp-modal-overlay" style="display:none">
    <div id="bp-modal-panel"></div>
  </div>

</body>
</html>
